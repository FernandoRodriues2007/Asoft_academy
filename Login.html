<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Iniciar Sessão-Asoft_academy</title>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-6 mt-20 text-purple-500 text-center">Iniciar Sessão</h1>
    <form action="#" method="POST" class="max-w-md mx-auto  flex justify-center flex-col bg-white p-6 rounded-lg lg:shadow-md ">
        <div class="mb-8">
            
            <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" placeholder="Email:">
        </div>
        <div class="mb-4">
            
            <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" placeholder="Senha:">
        </div>
        <button type="submit" class="w-36 bg-purple-500 text-white font-bold py-2 px-4 mx-auto rounded-full hover:bg-purple-600 transition duration-200">Entrar</button>
        <a href="Cadastro.html" class="text-purple-500 hover:underline text-center block mt-4">Criar Conta</a>
    </form>
    
</body>
</html>
