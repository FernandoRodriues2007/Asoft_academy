<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Criar Conta-Asoft_academy</title>
</head>
<body>
    <main class="container mx-auto px-4 py-28">
        <h1 class="text-3xl font-bold mb-6 text-purple-500 text-center">Criar Conta</h1>
        <form action="#" method="POST" class="max-w-md mx-auto  flex justify-center flex-col bg-white p-6 rounded-lg lg:shadow-md ">
            <div class="mb-4">
                
                <input type="text" id="name" name="name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300 " placeholder="Nome Completo:">
            </div>
            <div class="mb-4">
                
                <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" placeholder="Email:">
            </div>
            <div class="mb-4">
                
                <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" placeholder="Senha:">
            </div>
            <div class="mb-6">
                
                <input type="password" id="confirm_password" name="confirm_password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring focus:border-blue-300" placeholder="Confirmar Senha:">
            </div>
            <button type="submit" class="w-36 bg-purple-500 text-white font-bold py-2 px-4 mx-auto rounded-full hover:bg-purple-600 transition duration-200">Criar Conta</button>
            <a href="Login.html" class="text-purple-500 hover:underline text-center block mt-4">Iniciar Sessão</a>
        </form>
    
</body>
</html>
